<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Style 4 — Playful & Modern</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --sage:#c3d8c0;
    --sage-2:#a8c7a5;
    --peach:#f4d4a8;
    --terracotta:#c87e5a;
    --terracotta-dark:#a6654a;
    --green:#2d4a3e;
    --cream:#fff8ec;
    --ink:#1f2621;
    --ink-soft:#475148;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    background:
      radial-gradient(circle at 85% 20%, rgba(244,212,168,0.5), transparent 50%),
      radial-gradient(circle at 15% 85%, rgba(200,126,90,0.25), transparent 50%),
      linear-gradient(160deg, var(--sage) 0%, var(--sage-2) 100%);
    background-attachment:fixed;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 20px 60px;
  }
  header{
    width:100%;
    max-width:640px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
  }
  .wordmark{
    font-family:'Fraunces',serif;
    font-weight:900;
    font-size:28px;
    letter-spacing:-0.02em;
    color:var(--green);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .wordmark::after{
    content:"";
    width:14px;height:14px;border-radius:50%;
    background:var(--terracotta);
    box-shadow:0 4px 12px -4px rgba(200,126,90,0.6);
  }
  .pill{
    background:var(--cream);
    padding:10px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
    color:var(--green);
    box-shadow:0 4px 12px -6px rgba(45,74,62,0.3);
  }
  .progress{
    width:100%;
    max-width:640px;
    display:flex;
    gap:6px;
    margin-bottom:32px;
  }
  .pip{
    flex:1;
    height:8px;
    border-radius:999px;
    background:rgba(255,255,255,0.5);
  }
  .pip.done{background:var(--terracotta)}
  .card{
    width:100%;
    max-width:640px;
    background:var(--cream);
    border-radius:36px;
    padding:44px 40px 40px;
    box-shadow:
      0 24px 60px -24px rgba(45,74,62,0.35),
      0 8px 16px -12px rgba(200,126,90,0.3),
      inset 0 0 0 1px rgba(255,255,255,0.6);
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    font-weight:800;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--terracotta-dark);
    background:rgba(244,212,168,0.6);
    padding:6px 14px;
    border-radius:999px;
    margin-bottom:20px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:40px;
    line-height:1.1;
    letter-spacing:-0.025em;
    margin:0 0 32px;
    color:var(--green);
  }
  h1 .wave{
    font-weight:900;
    color:var(--terracotta);
    font-style:italic;
  }
  .answers{display:flex;flex-direction:column;gap:14px}
  .answer{
    display:flex;
    align-items:center;
    gap:18px;
    padding:18px 22px;
    border-radius:22px;
    background:#ffffff;
    cursor:pointer;
    font-weight:600;
    font-size:17px;
    color:var(--ink);
    border:2px solid transparent;
    transition:all .18s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 3px 0 var(--sage-2), 0 1px 0 rgba(0,0,0,0.03);
  }
  .answer:hover{
    transform:translateY(-3px) rotate(-0.4deg);
    border-color:var(--terracotta);
    box-shadow:0 8px 0 var(--terracotta-dark), 0 14px 24px -12px rgba(200,126,90,0.4);
  }
  .emoji{
    font-size:24px;
    width:44px;height:44px;
    background:var(--sage);
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .answer:hover .emoji{background:var(--peach)}
  footer{
    margin-top:28px;
    font-size:13px;
    font-weight:600;
    color:var(--green);
    opacity:0.7;
  }
</style>
</head>
<body>
  <header>
    <div class="wordmark">Basecamp</div>
    <div class="pill">1 / 6</div>
  </header>
  <div class="progress">
    <div class="pip done"></div>
    <div class="pip"></div>
    <div class="pip"></div>
    <div class="pip"></div>
    <div class="pip"></div>
    <div class="pip"></div>
  </div>
  <main class="card">
    <div class="eyebrow">☕ Coffee vibes</div>
    <h1>Your coffee should wake you up <span class="wave">like&hellip;</span></h1>
    <div class="answers">
      <div class="answer"><div class="emoji">🤗</div>A gentle nudge from a friend</div>
      <div class="answer"><div class="emoji">🎧</div>A good playlist</div>
      <div class="answer"><div class="emoji">⏰</div>An alarm clock</div>
      <div class="answer"><div class="emoji">🥶</div>A cold plunge</div>
    </div>
  </main>
  <footer>Made with love at Basecamp Coffee</footer>
</body>
</html>
