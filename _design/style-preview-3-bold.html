<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Style 3 — Bold & Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#120a06;
    --bg-2:#1f120b;
    --surface:#261610;
    --cream:#f5e6d0;
    --cream-muted:#c9b399;
    --gold:#d4a574;
    --gold-bright:#e8bf88;
    --line:#3a241a;
    --line-bright:#5a3a28;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    background:var(--bg);
    color:var(--cream);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background-image:
      radial-gradient(circle at 85% 15%, rgba(212,165,116,0.10), transparent 40%),
      radial-gradient(circle at 10% 90%, rgba(212,165,116,0.06), transparent 40%);
  }
  header{
    padding:24px 40px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .wordmark{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.02em;
    color:var(--cream);
    text-transform:uppercase;
  }
  .wordmark .dot{color:var(--gold);font-size:28px;line-height:0}
  .meta{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--gold);
    letter-spacing:0.16em;
    text-transform:uppercase;
  }
  .progress-track{
    height:2px;
    background:var(--line);
    position:relative;
  }
  .progress-fill{
    position:absolute;
    top:0;left:0;
    height:2px;
    width:16.66%;
    background:var(--gold);
    box-shadow:0 0 12px rgba(212,165,116,0.6);
  }
  main{
    flex:1;
    padding:80px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .inner{
    width:100%;
    max-width:780px;
  }
  .chapter{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--gold);
    letter-spacing:0.22em;
    text-transform:uppercase;
    margin:0 0 28px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .chapter::before,.chapter::after{
    content:"";
    display:inline-block;
    height:1px;
    background:var(--line-bright);
    flex:1;
  }
  .chapter::before{max-width:48px}
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:64px;
    line-height:1.02;
    letter-spacing:-0.03em;
    margin:0 0 48px;
    color:var(--cream);
    text-align:left;
  }
  h1 .accent{color:var(--gold)}
  .answers{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .answer{
    padding:24px 24px;
    border:1px solid var(--line-bright);
    background:var(--bg-2);
    cursor:pointer;
    transition:all .18s ease;
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:120px;
  }
  .answer:hover{
    border-color:var(--gold);
    background:var(--surface);
    box-shadow:0 0 0 1px var(--gold), 0 12px 32px -16px rgba(212,165,116,0.4);
  }
  .answer .num{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--gold);
    letter-spacing:0.12em;
  }
  .answer .text{
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:20px;
    line-height:1.3;
    color:var(--cream);
  }
  @media (max-width:820px){
    h1{font-size:44px}
    .answers{grid-template-columns:1fr}
  }
</style>
</head>
<body>
  <header>
    <div class="wordmark">BASECAMP<span class="dot">.</span></div>
    <div class="meta">Question 01 &nbsp;/&nbsp; 06</div>
  </header>
  <div class="progress-track"><div class="progress-fill"></div></div>
  <main>
    <div class="inner">
      <p class="chapter">Strength</p>
      <h1>Your coffee should wake you up like <span class="accent">&hellip;</span></h1>
      <div class="answers">
        <div class="answer"><span class="num">01</span><span class="text">A gentle nudge from a friend</span></div>
        <div class="answer"><span class="num">02</span><span class="text">A good playlist</span></div>
        <div class="answer"><span class="num">03</span><span class="text">An alarm clock</span></div>
        <div class="answer"><span class="num">04</span><span class="text">A cold plunge</span></div>
      </div>
    </div>
  </main>
</body>
</html>
